<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SriAura ✦ — Women in Tech Campus Intelligence System</title>
<meta name="description" content="SriAura: A DBMS-powered student dashboard to track, celebrate, and analyze female tech students' academic journeys.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Particles -->
<div class="particles" id="particles"></div>
<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>
<!-- Mobile Menu Toggle -->
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="particles" id="loginParticles"></div>
  <div class="login-box">
    <div class="logo" style="font-size:2rem;margin-bottom:10px">SriAura ✦</div>
    <p style="color:var(--text2);font-size:0.9rem">Women in Tech Campus Intelligence</p>
    <input type="password" id="passcode" placeholder="Enter Passcode" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="checkLogin()">Enter Dashboard</button>
    <p id="loginError" style="color:var(--red);font-size:0.8rem;margin-top:10px;display:none">Incorrect passcode</p>
  </div>
</div>

<!-- App -->
<div class="app" id="mainApp">
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
<div class="logo">SriAura ✦</div>
<nav id="nav">
<div class="nav-item active" data-page="dashboard"><span class="icon">📊</span>Dashboard</div>
<div class="nav-item" data-page="students"><span class="icon">👩‍💻</span>Students</div>
<div class="nav-item" data-page="achievements"><span class="icon">🏆</span>Achievements</div>
<div class="nav-item" data-page="events"><span class="icon">📅</span>Events</div>
<div class="nav-item" data-page="mentors"><span class="icon">🤝</span>Mentors</div>
<div class="nav-item" data-page="analytics"><span class="icon">📈</span>Analytics</div>
<div class="nav-item" data-page="leaderboard"><span class="icon">✨</span>Aura Board</div>
</nav>
</aside>
<!-- Main Content -->
<main class="main">
<div class="topbar">
<div class="search-wrap">
<span class="si">🔍</span>
<input type="text" id="globalSearch" placeholder="Search students, achievements, events..." oninput="handleSearch(this.value)">
<div class="search-results" id="searchResults"></div>
</div>
<div class="topbar-actions">
<button class="btn btn-secondary btn-sm" onclick="exportCSV()">📥 CSV</button>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>
</div>

<!-- PAGES START -->
<div id="page-dashboard" class="page active"></div>
<div id="page-students" class="page"></div>
<div id="page-achievements" class="page"></div>
<div id="page-events" class="page"></div>
<div id="page-mentors" class="page"></div>
<div id="page-analytics" class="page"></div>
<div id="page-leaderboard" class="page"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>

<!-- Footer -->
<div class="footer">"SriAura ✦ — Built with purpose. Designed for her. "</div>
</main>
</div>

<!-- JS Modules (loaded in dependency order) -->
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/auraboard.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/students.js"></script>
<script src="js/achievements.js"></script>
<script src="js/events.js"></script>
<script src="js/mentors.js"></script>
<script src="js/analytics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
